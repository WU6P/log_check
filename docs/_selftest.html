<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>log_check selftest</title><link rel="stylesheet" href="styles.css"></head>
<body>
<!-- same markup app.js binds to -->
<header><h1>log_check</h1>
  <div class="bar">
    <label class="btn">Open<input type="file" id="file" hidden></label>
    <span class="grp">Exchange field: <select id="field" disabled></select></span>
    <label class="chk"><input type="checkbox" id="force"> force</label>
    <span class="spacer"></span><button id="help" class="btn">Help</button>
    <button id="save" class="btn" disabled>Save…</button>
  </div>
  <p id="summary" class="summary">Loading…</p>
</header>
<div id="help-win" class="modal hidden"><div class="help-box">
  <div class="help-head"><h2>Help</h2><span class="spacer"></span>
    <button id="help-close" class="btn">Close</button></div>
  <div class="help-body"></div></div></div>
<main><table id="table"><thead><tr id="head"></tr></thead><tbody id="body"></tbody></table>
  <p id="empty" class="empty">No log loaded.</p></main>
<footer>
  <button id="review" class="btn primary" disabled>▸ Review issues</button>
  <button id="edit" class="btn" disabled>Edit fields…</button>
  <button id="del" class="btn danger" disabled>Delete QSO</button>
</footer>
<div id="review-win" class="modal hidden"><div class="review-box">
  <div class="review-head"><span id="rv-pos" class="rv-pos"></span><span class="spacer"></span>
    <button id="rv-prev" class="btn">‹ Prev</button><button id="rv-next" class="btn">Next ›</button>
    <button id="rv-close" class="btn">Close</button></div>
  <div id="rv-body" class="rv-body"></div>
  <div class="review-foot"><button id="rv-prev2" class="btn">‹ Prev</button><span class="spacer"></span>
    <span id="rv-hint" class="rv-hint"></span><span class="spacer"></span>
    <button id="rv-next2" class="btn">Next ›</button></div>
</div></div>
<div id="modal" class="modal hidden"><div class="modal-box"><h2 id="modal-title"></h2>
  <div id="modal-fields" class="modal-fields"></div>
  <div class="modal-add"><input id="new-key"><input id="new-val"></div>
  <div class="modal-actions"><button id="modal-cancel" class="btn">Cancel</button>
  <button id="modal-ok" class="btn primary">OK</button></div></div></div>

<pre id="result">running…</pre>
<script type="module" src="app.js"></script>
<script type="module">
import * as lc from "./logcore.js";
const out = document.getElementById("result");
const log = [];
let failed = 0;
const ok = (c, m) => { log.push((c ? "ok   " : "FAIL ") + m); if (!c) failed++; };

// Synthetic log exercising all five checks. RX_PWR is the exchange field (so it
// doesn't collide with the CQZ zone check).
function adif(recs) {
  const head = "x <EOH>\n";
  return head + recs.map(r => Object.entries(r)
    .map(([k, v]) => `<${k}:${String(v).length}>${v}`).join(" ") + " <EOR>").join("\n");
}
const T = (n) => `00${String(n).padStart(2, "0")}00`;
const recs = [];
for (let i = 0; i < 8; i++) recs.push({ CALL: `W${i}AW`, QSO_DATE: "20260101", TIME_ON: T(i), BAND: "20M", RX_PWR: "KW" });
recs.push({ CALL: "P5DX", QSO_DATE: "20260101", TIME_ON: T(10), BAND: "20M", RX_PWR: "KW" });   // rare
recs.push({ CALL: "DL1ABC", QSO_DATE: "20260101", TIME_ON: T(11), BAND: "20M", RX_PWR: "100" }); // exch early-wrong
recs.push({ CALL: "DL1ABC", QSO_DATE: "20260101", TIME_ON: T(12), BAND: "15M", RX_PWR: "KW" });
recs.push({ CALL: "DL1ABC", QSO_DATE: "20260101", TIME_ON: T(13), BAND: "10M", RX_PWR: "KW" });
recs.push({ CALL: "JA1ZZZ", QSO_DATE: "20260101", TIME_ON: T(14), BAND: "20M", RX_PWR: "KW", CQZ: "5" }); // zone: JA=25
recs.push({ CALL: "0Q1QQ", QSO_DATE: "20260101", TIME_ON: T(15), BAND: "20M", RX_PWR: "KW" });  // unresolved call
for (let i = 0; i < 3; i++) recs.push({ CALL: "DL5ABC", QSO_DATE: "20260101", TIME_ON: T(16 + i), BAND: "20M", RX_PWR: "KW" }); // anchor
recs.push({ CALL: "DL5ABD", QSO_DATE: "20260101", TIME_ON: T(19), BAND: "20M", RX_PWR: "KW" });  // near-dupe of DL5ABC
const text = adif(recs);

window.confirm = () => true;          // auto-accept fix/delete dialogs

function waitReady() {
  return new Promise((res) => {
    const t = setInterval(() => {
      if (window.__lcLoad && document.getElementById("summary").textContent.startsWith("Ready")) {
        clearInterval(t); res();
      }
    }, 50);
  });
}

window.addEventListener("error", (e) => {
  out.textContent = log.join("\n") + "\n\nUNCAUGHT: " + e.message + "\n" + (e.error && e.error.stack || "");
  document.title = "SELFTEST FAIL";
});

(async () => {
 try {
  await waitReady();
  window.__lcLoad(text, "selftest");

  const rows = () => document.querySelectorAll("#body tr").length;
  const summary = () => document.getElementById("summary").textContent;
  const pos = () => document.getElementById("rv-pos").textContent;
  const rvBody = () => document.getElementById("rv-body").textContent;
  const nIssues = () => +(pos().match(/of (\d+)/) || [0, 0])[1];
  const wait = () => new Promise(r => setTimeout(r, 20));

  ok(rows() === 18, `rendered 18 rows (got ${rows()})`);
  ok(document.querySelectorAll("#body tr.rare").length === 1, "one rare row highlighted");
  ok(document.querySelectorAll("#body tr.exch").length === 4, "four other-issue rows highlighted (exch/zone/call/dupe)");
  ok(/\b1 rare DXCC/.test(summary()), "summary: 1 rare");
  ok(/1 auto-fixable/.test(summary()), "summary: 1 auto-fixable");
  ok(/1<\/b> zone|1 zone/.test(summary()), "summary: 1 zone");
  ok(/1 bad-call/.test(summary()), "summary: 1 bad-call");
  ok(/1 near-dupe/.test(summary()), "summary: 1 near-dupe");

  // --- review window: 5 issues, one per check ---
  ok(/Review issues \(5\)/.test(document.getElementById("review").textContent), "review button shows 5 issues");
  document.getElementById("review").click();
  ok(/Issue 1 of 5/.test(pos()), "opens at Issue 1 of 5");
  ok(/P5DX/.test(rvBody()) && /RARE/.test(rvBody()), "issue 1 is rare P5DX");

  // walk all issues, collect their text
  const goFirst = () => { for (let k = 0; k < 8; k++) document.getElementById("rv-prev").click(); };
  goFirst();
  const texts = [];
  for (let k = 0, N = nIssues(); k < N; k++) { texts.push(rvBody()); if (k < N - 1) document.getElementById("rv-next").click(); }
  const all = texts.join(" || ");
  ok(/ZONE/.test(all) && /JA1ZZZ/.test(all) && /\b25\b/.test(all), "zone issue present (JA1ZZZ, expected 25)");
  ok(/CALL/.test(all) && /0Q1QQ/.test(all), "bad-call issue present (0Q1QQ)");
  ok(/NEAR-DUPE/.test(all) && /DL5ABD/.test(all) && /DL5ABC/.test(all), "near-dupe issue present (DL5ABD -> DL5ABC)");

  // dupe fix: find & click the "Change call" button across issues
  const findBtn = (re) => { goFirst(); for (let k = 0, N = nIssues(); k < N; k++) {
    const b = [...document.querySelectorAll("#rv-body .rv-fix .btn")].find(x => re.test(x.textContent));
    if (b) return b; document.getElementById("rv-next").click();
  } return null; };
  const dupeBtn = findBtn(/Change call to DL5ABC/);
  ok(!!dupeBtn, "near-dupe 'Change call' button present");
  dupeBtn.click(); await wait();
  ok(/0 near-dupe/.test(summary()), "near-dupe cleared after Change call");

  // exchange fix: find & click the "Apply fix" button
  const applyBtn = findBtn(/Apply fix/);
  ok(!!applyBtn, "exchange 'Apply fix' button present");
  const posBefore = pos();                       // remember which issue we're on
  applyBtn.click(); await wait();
  ok(/0 busts/.test(summary()), "no exchange busts after Apply fix");
  // after applying, STAY on the same issue and show a resolved confirmation
  ok(pos() === posBefore, `stays on same issue after fix (was ${posBefore}, now ${pos()})`);
  ok(/resolved/i.test(rvBody()), "shows resolved confirmation after fix");

  document.getElementById("rv-close").click();
  ok(document.getElementById("review-win").classList.contains("hidden"), "review window closed");

  // delete a row
  const cb = document.querySelector('#body input[data-sel="0"]');
  cb.checked = true; cb.dispatchEvent(new Event("change", { bubbles: true }));
  document.getElementById("del").click(); await wait();
  ok(rows() === 17, `17 rows after delete (got ${rows()})`);

  // --- help window opens and closes ---
  document.getElementById("help").click();
  ok(!document.getElementById("help-win").classList.contains("hidden"), "help opens");
  document.getElementById("help-close").click();
  ok(document.getElementById("help-win").classList.contains("hidden"), "help closes");

  // --- change report: a field edit shows up as a modification + diff ---
  const a = [{ CALL: "W1AW", QSO_DATE: "20260101", TIME_ON: "000000", CQZ: "05", _LCID: 0 }];
  const b = [{ ...a[0], CQZ: "04" }];
  const rep = lc.buildChangeReport(a, b, { fileName: "x", format: "adif" });
  ok(/Modified QSOs:/.test(rep) && /CQZ: '05' -> '04'/.test(rep), "report lists the field change");
  ok(/== Unified diff/.test(rep) && /-<CALL/.test(rep) && /\+<CALL/.test(rep), "report has a unified diff");

  out.textContent = log.join("\n") + `\n\nSELFTEST: ${failed ? "FAIL (" + failed + ")" : "PASS"}`;
  document.title = failed ? "SELFTEST FAIL" : "SELFTEST PASS";
 } catch (err) {
  out.textContent = log.join("\n") + "\n\nTHREW: " + (err && err.stack || err);
  document.title = "SELFTEST FAIL";
 }
})();
</script>
</body>
</html>
